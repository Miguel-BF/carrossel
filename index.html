<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* CARROSSEL FULL */
.carousel {
  width: 100vw;
  height: 90vh; /* melhor para Google Sites */
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  perspective: 1200px;
}

/* SLIDES */
.slide {
  position: absolute;
  width: 65%;
  height: 380px;
  border-radius: 20px;
  background-size: cover;
  background-position: center;
  transition: all 0.8s ease;
  opacity: 0;
  box-shadow: 0 25px 60px rgba(0,0,0,0.6);
  overflow: hidden;
}

/* POSIÇÕES */
.center {
  transform: translateX(0) scale(1);
  opacity: 1;
  z-index: 3;
}

.left {
  transform: translateX(-70%) scale(0.8);
  opacity: 0.5;
  z-index: 2;
}

.right {
  transform: translateX(70%) scale(0.8);
  opacity: 0.5;
  z-index: 2;
}

.hidden {
  opacity: 0;
  z-index: 1;
}

/* OVERLAY */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
}

/* TEXTO */
.text {
  position: absolute;
  bottom: 25px;
  left: 30px;
  color: white;
}

.text h2 {
  margin: 0;
  font-size: 30px;
}

.text p {
  margin: 5px 0 0;
  font-size: 15px;
}

/* RESPONSIVO */
@media (max-width: 768px) {
  .slide {
    width: 85%;
    height: 300px;
  }

  .left, .right {
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="carousel">

  <div class="slide" style="background-image: url('https://picsum.photos/1200/600?1')">
    <div class="overlay"></div>
    <div class="text">
      <h2>PWAs</h2>
      <p>Apps direto no navegador</p>
    </div>
  </div>

  <div class="slide" style="background-image: url('https://picsum.photos/1200/600?2')">
    <div class="overlay"></div>
    <div class="text">
      <h2>Cloud Computing</h2>
      <p>AWS, Azure e Google Cloud</p>
    </div>
  </div>

  <div class="slide" style="background-image: url('https://picsum.photos/1200/600?3')">
    <div class="overlay"></div>
    <div class="text">
      <h2>Web3</h2>
      <p>Internet descentralizada</p>
    </div>
  </div>

  <div class="slide" style="background-image: url('https://picsum.photos/1200/600?4')">
    <div class="overlay"></div>
    <div class="text">
      <h2>Arquitetura</h2>
      <p>Microsserviços vs Monólitos</p>
    </div>
  </div>

</div>

<script>
let slides = document.querySelectorAll('.slide');
let index = 0;

function updateSlides() {
  slides.forEach((slide, i) => {
    slide.classList.remove('center', 'left', 'right', 'hidden');

    if (i === index) {
      slide.classList.add('center');
    } else if (i === (index - 1 + slides.length) % slides.length) {
      slide.classList.add('left');
    } else if (i === (index + 1) % slides.length) {
      slide.classList.add('right');
    } else {
      slide.classList.add('hidden');
    }
  });
}

function nextSlide() {
  index = (index + 1) % slides.length;
  updateSlides();
}

setInterval(nextSlide, 3500);
updateSlides();
</script>

</body>
</html>
