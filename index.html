<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.carousel {
  width: 100vw;
  height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  perspective: 1200px;
}

.slide {
  position: absolute;
  width: 65%;
  height: 380px;
  border-radius: 20px;
  background-size: cover;
  background-position: center;
  transition: all 0.8s ease;
  opacity: 0;
  box-shadow: 0 25px 60px rgba(0,0,0,0.6);
  overflow: hidden;
  cursor: pointer;
}

.center { transform: translateX(0) scale(1); opacity: 1; z-index: 3; }
.left { transform: translateX(-70%) scale(0.8); opacity: 0.5; z-index: 2; }
.right { transform: translateX(70%) scale(0.8); opacity: 0.5; z-index: 2; }
.hidden { opacity: 0; }

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
}

.text {
  position: absolute;
  bottom: 25px;
  left: 30px;
  color: white;
}

.text h2 {
  margin: 0;
  font-size: 30px;
}

.text p {
  margin: 5px 0 0;
  font-size: 15px;
}
</style>
</head>

<body>

<div class="carousel">

  <div class="slide" onclick="goTo('pwas.html')" style="background-image: url('https://images.unsplash.com/photo-1551650975-87deedd944c3')">
    <div class="overlay"></div>
    <div class="text">
      <h2>PWAs</h2>
      <p>Apps direto no navegador</p>
    </div>
  </div>

  <div class="slide" onclick="goTo('cloud.html')" style="background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa')">
    <div class="overlay"></div>
    <div class="text">
      <h2>Cloud Computing</h2>
      <p>Escalabilidade na nuvem</p>
    </div>
  </div>

  <div class="slide" onclick="goTo('web3.html')" style="background-image: url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0')">
    <div class="overlay"></div>
    <div class="text">
      <h2>Web3</h2>
      <p>Internet descentralizada</p>
    </div>
  </div>

  <div class="slide" onclick="goTo('arquitetura.html')" style="background-image: url('https://images.unsplash.com/photo-1558494949-ef010cbdcc31')">
    <div class="overlay"></div>
    <div class="text">
      <h2>Arquitetura</h2>
      <p>Microsserviços vs Monólitos</p>
    </div>
  </div>

</div>

<script>
let slides = document.querySelectorAll('.slide');
let index = 0;

function updateSlides() {
  slides.forEach((slide, i) => {
    slide.classList.remove('center', 'left', 'right', 'hidden');

    if (i === index) {
      slide.classList.add('center');
    } else if (i === (index - 1 + slides.length) % slides.length) {
      slide.classList.add('left');
    } else if (i === (index + 1) % slides.length) {
      slide.classList.add('right');
    } else {
      slide.classList.add('hidden');
    }
  });
}

function nextSlide() {
  index = (index + 1) % slides.length;
  updateSlides();
}

function goTo(page) {
  window.location.href = page;
}

setInterval(nextSlide, 3500);
updateSlides();
</script>

</body>
</html>
